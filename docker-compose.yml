services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: allteachers
      POSTGRES_USER: allteachers
      POSTGRES_PASSWORD: allteachers
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./DDL.sql:/docker-entrypoint-initdb.d/01-ddl.sql
      - ./DML.sql:/docker-entrypoint-initdb.d/02-dml.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allteachers"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Valkey (Redis-compatible) ────────────────────────────────────────────────
  valkey:
    image: valkey/valkey:8
    # AOF + RDB 스냅샷 동시 활성화 → refresh token 영속성 보장
    command: valkey-server --appendonly yes --appendfsync everysec --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/allteachers
      SPRING_DATASOURCE_USERNAME: allteachers
      SPRING_DATASOURCE_PASSWORD: allteachers
      SPRING_DATA_REDIS_HOST: valkey
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_started

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  valkey_data:
