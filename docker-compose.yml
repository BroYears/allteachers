services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./DDL.sql:/docker-entrypoint-initdb.d/01-ddl.sql
      - ./DML.sql:/docker-entrypoint-initdb.d/02-dml.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Valkey (Redis-compatible) ────────────────────────────────────────────────
  valkey:
    image: valkey/valkey:8
    command: >
      valkey-server
      --appendonly yes
      --appendfsync everysec
      --save 60 1
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build: ./backend
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: valkey
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_started

  # ── Mailpit (로컬 메일 테스트) ──────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  valkey_data:
