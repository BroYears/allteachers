server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router BrowserRouter 지원 → 모든 경로를 index.html로 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자산 캐싱 (Vite 빌드 결과물은 해시 포함 → 장기 캐싱 가능)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
